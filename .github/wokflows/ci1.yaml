name: Terraform CI

on:
  pull_request:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init
        run: terraform init
        working-directory: terraform/

      - name: Validate
        run: terraform validate
        working-directory: terraform/

      - name: Plan
        run: terraform plan
        working-directory: terraform/